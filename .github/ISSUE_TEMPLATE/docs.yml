name: Docs
description: Documentation work for NicheLens-ST.
labels: [docs]
body:
  - type: textarea
    id: scope
    attributes:
      label: What should change?
    validations:
      required: true
  - type: checkboxes
    id: guardrails
    attributes:
      label: Guardrails
      options:
        - label: Does not introduce performance or biology claims without evidence.
          required: true
        - label: Does not reference sibling brands.
          required: true
