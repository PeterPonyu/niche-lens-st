name: Feature
description: Propose a feature for NicheLens-ST.
labels: [feature]
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What should be added?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist of testable criteria.
    validations:
      required: true
  - type: checkboxes
    id: guardrails
    attributes:
      label: Guardrails
      options:
        - label: Will not vendor or copy baseline source.
          required: true
        - label: Will not reference sibling brands (lumina-st, aether-3d, factorgraph-st).
          required: true
        - label: Will not claim performance vs baselines without local-test evidence.
          required: true
