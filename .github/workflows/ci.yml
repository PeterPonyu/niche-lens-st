name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  independence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install cffconvert
        run: python -m pip install --upgrade pip cffconvert
      - name: Brand / leakage scan (incl. cffconvert --validate)
        run: bash scripts/check_independence.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        # Pinned (not floating) so a future ruff release's new default rules
        # can't redden main without a deliberate bump. Last green on 0.15.16.
        run: python -m pip install --upgrade pip && python -m pip install ruff==0.15.16
      - name: Ruff lint (config in pyproject.toml)
        run: ruff check .

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Exercise the full declared range (requires-python = ">=3.10").
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package if pyproject.toml exists
        run: |
          if [ -f pyproject.toml ]; then
            python -m pip install --upgrade pip
            # Install the CPU-only torch wheel first so the [model] extra does
            # not pull the large CUDA build, then install the package with the
            # model + test extras so the torch-backed encoder tests actually run
            # in CI instead of being skipped.
            python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
            python -m pip install -e ".[model,test]"
          else
            echo "No pyproject.toml; skipping package install."
          fi

      - name: Run pytest if test files exist
        run: |
          if find tests -name 'test_*.py' -print -quit 2>/dev/null | grep -q .; then
            python -m pytest -q
          else
            echo "No test_*.py files yet; skipping pytest."
          fi
